<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intel Sustainability Summit Check-In</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Bootstrap CSS (loaded before custom CSS so our styles take precedence) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Toast container (top-right, fixed) -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div
        id="checkInToast"
        class="toast border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        data-bs-delay="4000"
      >
        <div class="toast-body fw-semibold" id="toastMessage"></div>
      </div>
    </div>

    <!-- Hero section with Intel branding -->
    <div class="hero">
      <div class="hero-content">
        <img src="img/intel-logo.svg" alt="Intel Logo" class="intel-logo" />
        <h1>Team Sustainability Summit</h1>
        <div class="hero-divider"></div>
        <p>
          <i class="fas fa-leaf"></i> Check-in system for sustainability event
          attendees
        </p>
      </div>
    </div>

    <!-- Attendance tracking -->
    <div class="attendance-tracker">
      <div class="attendance-header">
        <i class="fas fa-users"></i>
        Attendance: <span id="attendeeCount">0</span>/50
      </div>
      <!-- Bootstrap progress bar: striped + animated until goal is reached -->
      <div
        class="progress-container progress"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          id="progressBar"
          class="progress-bar progress-bar-striped progress-bar-animated"
        ></div>
      </div>
    </div>

    <div class="container">
      <!-- Feedback message (kept for screen readers; toast is primary UI) -->
      <p id="greeting" aria-live="polite"></p>

      <!-- Check-in form -->
      <form class="check-in" id="checkInForm" novalidate>
        <label for="attendeeName" class="form-label">Attendee Check-In</label>
        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="text"
              id="attendeeName"
              name="attendeeName"
              placeholder="Enter name..."
            />
            <select id="teamSelect" name="team">
              <option value="" disabled selected>Select Team...</option>
              <option value="water">Team Water Wise</option>
              <option value="zero">Team Net Zero</option>
              <option value="power">Team Renewables</option>
            </select>
          </div>
          <button type="submit" id="checkInBtn">
            <i class="fas fa-user-check"></i> Check In
          </button>
        </div>
      </form>

      <!-- Team stats -->
      <div class="team-stats">
        <h3>Team Attendance</h3>
        <div class="teams-grid">
          <div class="team-card water">
            <span class="team-name">🌊 Team Water Wise</span>
            <span class="team-count" id="waterCount">0</span>
          </div>
          <div class="team-card zero">
            <span class="team-name">🌿 Team Net Zero</span>
            <span class="team-count" id="zeroCount">0</span>
          </div>
          <div class="team-card power">
            <span class="team-name">⚡ Team Renewables</span>
            <span class="team-count" id="powerCount">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Goal-reached modal -->
    <div
      class="modal fade"
      id="goalModal"
      tabindex="-1"
      aria-labelledby="goalModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center border-0 rounded-4">
          <div class="modal-body p-5">
            <div style="font-size: 3.5rem">🎉</div>
            <h4
              class="mt-3 fw-bold"
              id="goalModalLabel"
              style="color: #0071c5"
            >
              Attendance Goal Reached!
            </h4>
            <p class="text-muted mt-2">
              All 50 attendees have checked in. Outstanding turnout!
            </p>
            <button
              type="button"
              class="btn mt-3 px-4 py-2 fw-semibold text-white rounded-3"
              style="background-color: #0071c5"
              data-bs-dismiss="modal"
            >
              Awesome!
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      &copy; 2025 Intel •
      <a
        href="https://www.intel.com/content/www/us/en/corporate-responsibility/2030-goals.html"
        class="footer-link"
        >Sustainability Goals</a
      >
    </footer>

    <!-- Bootstrap JS bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
